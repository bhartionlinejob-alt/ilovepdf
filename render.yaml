services:
  - type: web
    name: pdf-4u-online
    env: node
    buildCommand: npm install
    startCommand: npm start
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: CLOUDCONVERT_API_KEY
        sync: false  # This means you'll set it manually in Render dashboard
