<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - PDF Tools</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
    <div class="admin-container">
        <div class="admin-sidebar">
            <h2><i class="fas fa-cog"></i> Admin Panel</h2>
            <nav>
                <a href="#general" class="active" data-tab="general">
                    <i class="fas fa-sliders-h"></i> General Settings
                </a>
                <a href="#appearance" data-tab="appearance">
                    <i class="fas fa-palette"></i> Appearance
                </a>
                <a href="#adsense" data-tab="adsense">
                    <i class="fas fa-ad"></i> AdSense
                </a>
                <a href="#security" data-tab="security">
                    <i class="fas fa-lock"></i> Security
                </a>
                <a href="#advanced" data-tab="advanced">
                    <i class="fas fa-code"></i> Advanced
                </a>
            </nav>
        </div>
        
        <div class="admin-content">
            <div class="admin-header">
                <h1>Website Settings</h1>
                <button id="save-settings" class="btn-save">
                    <i class="fas fa-save"></i> Save Changes
                </button>
            </div>
            
            <div id="general" class="tab-content active">
                <div class="settings-group">
                    <h3>General Settings</h3>
                    <div class="setting-field">
                        <label>Website Name</label>
                        <input type="text" id="siteName" placeholder="PDF Tools">
                    </div>
                    <div class="setting-field">
                        <label>Footer Text</label>
                        <textarea id="footerText" rows="3"></textarea>
                    </div>
                    <div class="setting-field">
                        <label>Max File Size (MB)</label>
                        <input type="number" id="maxFileSize" value="50">
                    </div>
                    <div class="setting-field">
                        <label>Site Logo</label>
                        <input type="file" id="logoUpload" accept="image/*">
                        <div id="logoPreview"></div>
                    </div>
                </div>
            </div>
            
            <div id="appearance" class="tab-content">
                <div class="settings-group">
                    <h3>Theme & Colors</h3>
                    <div class="setting-field">
                        <label>Theme</label>
                        <select id="theme">
                            <option value="light">Light</option>
                            <option value="dark">Dark</option>
                        </select>
                    </div>
                    <div class="setting-field">
                        <label>Primary Color</label>
                        <input type="color" id="primaryColor" value="#e74c3c">
                    </div>
                    <div class="setting-field">
                        <label>Secondary Color</label>
                        <input type="color" id="secondaryColor" value="#c0392b">
                    </div>
                    <div class="setting-field">
                        <label>Watermark Text</label>
                        <input type="text" id="watermarkText" value="WATERMARK">
                    </div>
                </div>
            </div>
            
            <div id="adsense" class="tab-content">
                <div class="settings-group">
                    <h3>AdSense Integration</h3>
                    <div class="setting-field">
                        <label>Enable AdSense</label>
                        <input type="checkbox" id="adsenseEnabled">
                    </div>
                    <div class="setting-field">
                        <label>AdSense Code</label>
                        <textarea id="adsenseCode" rows="5" placeholder="Paste your AdSense code here..."></textarea>
                        <small>Paste the entire AdSense script tag</small>
                    </div>
                    <div class="setting-field">
                        <label>Analytics Code</label>
                        <textarea id="analyticsCode" rows="3" placeholder="Google Analytics or other tracking code..."></textarea>
                    </div>
                </div>
            </div>
            
            <div id="security" class="tab-content">
                <div class="settings-group">
                    <h3>Security Settings</h3>
                    <div class="setting-field">
                        <label>Admin Username</label>
                        <input type="text" id="adminUsername">
                    </div>
                    <div class="setting-field">
                        <label>Current Password</label>
                        <input type="password" id="currentPassword">
                    </div>
                    <div class="setting-field">
                        <label>New Password</label>
                        <input type="password" id="newPassword">
                    </div>
                    <div class="setting-field">
                        <label>Confirm New Password</label>
                        <input type="password" id="confirmPassword">
                    </div>
                    <button id="changePassword" class="btn-secondary">Change Password</button>
                </div>
            </div>
            
            <div id="advanced" class="tab-content">
                <div class="settings-group">
                    <h3>Custom Code</h3>
                    <div class="setting-field">
                        <label>Custom CSS</label>
                        <textarea id="customCSS" rows="8" placeholder="/* Add your custom CSS here */"></textarea>
                    </div>
                    <div class="setting-field">
                        <label>Custom JavaScript</label>
                        <textarea id="customJS" rows="8" placeholder="// Add your custom JavaScript here"></textarea>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="notification" class="notification"></div>
    
    <script src="/js/admin.js"></script>
</body>
</html>
